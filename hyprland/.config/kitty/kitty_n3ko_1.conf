# Font: JetBrainsMono
font_family JetBrainsMono Nerd Font
font_size 14

# Features
disable_ligatures    no
enable_audio_bell    no
remember_window_size no

# Shell and Cursor
shell                 zsh
shell_integration     no-cursor
cursor_shape          block
url_style             curly
cursor_blink_interval 0

# Padding
window_padding_width  15
window_padding_height 10

# Scroll back up to 3000 lines.
scrollback_lines 3000

# Just a keybind to change font size to your liking, it's CTRL + scroll wheel up or down.
map ctrl+shift+plus  change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0

# Background and Scroll Bar Opacity
background_opacity             0.80
scrollbar_handle_opacity       0
scrollbar_track_opacity        0
scrollbar_track_handle_opacity 0
confirm_os_window_close        0

# Cursor traile
cursor_trail 3

# Ajusta el decaimiento del rastro (en segundos)
# Un valor más alto hace que el rastro sea más largo
cursor_trail_decay 0.1 0.4

# El rastro solo aparece si el cursor se mueve más de esta distancia (en celdas)
cursor_trail_start_threshold 2

# Colors: Cattpuchine Mocha

# The basic colors
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor colors
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# Scrollbar colors
scrollbar_handle_color  #9399b2
scrollbar_track_color   #45475a

# URL color when hovering with mouse
url_color               #f5e0dc

# Kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Colors for marks (marked text in the terminal)
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

