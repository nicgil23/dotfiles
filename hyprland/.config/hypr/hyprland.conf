# ================================
#   Hyprland config file by n3ko
# ================================

# Wiki ~ https://wiki.hypr.land/Configuring/

# ===== MONITORS ===== 
# Wiki ~ https://wiki.hypr.land/Configuring/Monitors/

# Monitor 1 (Pantalla del portatil)
monitor = eDP-1, 1920x1200@60, 0x0, 1.2

# Otros monitores (Configuracion automatica)
monitor = , preferred, auto, 1

# ===== MY PROGRAMS =====
# Wiki ~ https://wiki.hypr.land/Configuring/Variables/

# Variables de mis programas default
$terminal = kitty
$fileManager = nautilus --new-window
$menu = ~/.config/rofi/launchers/type-1/launcher.sh || pkill rofi
$logOut = pkill wlogout || wlogout --buttons-per-row 5
$browser = firefox
$keyboard = pkill -9 wvkbd-mobintl || wvkbd-mobintl

# ===== AUTOSTART =====
# Wiki ~ https://wiki.hypr.land/Useful-Utilities/Systemd-start/

exec-once = hyprctl setcursor McMojave Cursors 28
exec-once = nm-applet &
exec-once = waybar
exec-once = swaync
exec-once = /usr/lib/ polkit-kde-authentication-agent-1
exec-once = swww-daemon
exec-once = blueman-applet
exec-once = iio-hyprland
exec-once = hyprpm reload

# ===== ENVIRONMENT VARIABLES =====
# Wiki ~ https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_THEME,McMojave Cursors
env = XCURSOR_SIZE,28
env = HYPRCURSOR_SIZE,28

# ===== LOOK AND FEEL =====
# Wiki ~ https://wiki.hypr.land/Configuring/Variables/

xwayland {
  force_zero_scaling = true
}

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(cdd6f4)
    col.inactive_border = rgb(45475a)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 0.99
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 2
        render_power = 3
    }

    blur {
        enabled = true
    }
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/         
dwindle {
    pseudotile = true
    preserve_split = true
}

# Read https://wiki.hyprland.org/Configuring/Master-Layout/ for more info on master layout.
master {
    new_status = master
}

# We have our own wallpapers :) So I'll disable default things.
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# ===== INPUT =====
# https://wiki.hypr.land/Configuring/Variables/#input

input {
    kb_layout = es
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 4, horizontal, workspace
gesture = 4, vertical, scale: 1, fullscreen
gesture = 4, down, mod: ALT, close

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# ===== KEYBINDINGS =====
# Wiki ~ https://wiki.hypr.land/Configuring/Keywords/

# Ponemos la tecla de WINDOWS como principal key
$mainMod = SUPERvariable-types

# Principal KeyBinds
bind = $mainMod, Q, exec, $terminal # TERMINAL
bind = $mainMod, W, killactive, # KILL ACTUAL INSTANCE
bind = $mainMod, L, exec, $logOut
bind = $mainMod, E, exec, $fileManager # FILE MANAGER
bind = $mainMod, V, togglefloating, # ACTIVATE FLOATING WINDOWS
bind = $mainMod, space, exec, $menu
bind = $mainMod, F, exec, $browser
bind = $mainMod, R, exec, ~/.config/waybar/scripts/launch.sh
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, O, exec, obsidian-sync

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Captures
bind = $mainMod, C, exec, hyprshot -m output -m eDP-1
bind = $mainMod SHIFT, C, exec, grim -g "$(slurp)" - | wl-copy

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = ,XF86Calculator, exec, org.gnome.Calculator

# Requires playerctl
#bindl = , XF86AudioNext, exec, playerctl next
#bindl = , XF86AudioPause, exec, playerctl play-pause
#bindl = , XF86AudioPlay, exec, playerctl play-pause
#bindl = , XF86AudioPrev, exec, playerctl previous

# ===== WINDOWS AND WORKSPACES =====
# WIki ~ https://wiki.hypr.land/Configuring/Window-Rules/ for more
# Wiki ~ https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # Ignore maximize requests from all apps
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule = match:class obsidian, workspace 5

plugin {
  touch_gestures {
    # The default sensitivity is probably too low on tablet screens,
    # I recommend turning it up to 4.0
    sensitivity = 3.0

    # must be >= 3
    workspace_swipe_fingers = 3

    # in milliseconds
    long_press_delay = 400

    # in pixels, the distance from the edge that is considered an edge
    edge_margin = 10
    
    # up: u; down: d; left: l, right: r.

    # Gestos de deslizamiento (Swipe)
    bindt = , swipe:4:d, killactive
    
    # Gestos de borde (Edge swipes)
    bindt = , edge:l:r, exec, $keyboard & $menu
    bindt = , edge:r:l, exec, grim -g "$(slurp)" - | wl-copy
    bindt = , edge:d:u, exec, $keyboard 
  }
}

