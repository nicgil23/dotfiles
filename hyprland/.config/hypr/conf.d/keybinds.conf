# ===== KEYBINDINGS =====
# Wiki ~ https://wiki.hypr.land/Configuring/Keywords/

# Main key -> Windows Key
$mainMod = SUPER

# Principal KeyBinds
bind = $mainMod, Q, exec, $terminal # TERMINAL
bind = $mainMod, H, exec, $terminal --hold fastfetch # TERMINAL FASTFETCH
bind = $mainMod, W, killactive, # KILL ACTUAL INSTANCE
bind = $mainMod, L, exec, $logOut # LOG OUT
bind = $mainMod, E, exec, $fileManager # FILE MANAGER
bind = $mainMod, space, exec, $menu # PROGRAMS MENU
bind = $mainMod, F, exec, $browser # FIREFOX
bind = $mainMod, R, exec, ~/dotfiles/hyprland/.config/hypr/scripts/restart-customs.sh # RESET CUSTOM UI
bind = $mainMod, O, exec, ~/dotfiles/hyprland/.config/hypr/scripts/obsidian-sync.sh
bind = $mainMod, period, exec, rofimoji --selector rofi --action copy # EMOJIS
bind = $mainMod, comma, exec, $clipboard # EMOJIS
bind = $mainMod, T, exec, $browser --new-window https://app.todoist.com/app/today # TODOIST
bind = $mainMod, Y, exec, ~/dotfiles/hyprland/.config/rofi/wallpaper-changer/wallpaper-launcher.sh || pkill rofi # WALLPAPER CHANGER
bind = $mainMod, U, exec, $browser www.ucm.es/campusvirtual
bind = $mainMod, ntilde, exec, ~/dotfiles/hyprland/.config/hypr/scripts/vpn-ucm.sh 
bind = $mainMod, K, exec, kitty vi ~/dotfiles/hyprland/.config/hypr/conf.d/keybinds.conf 

# Dwindle & Movement rules
bind = $mainMod, V, togglefloating, # ACTIVATE FLOATING WINDOWS
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binde = SUPER, X, swapnext

# Movement with arrows
bind = SUPER SHIFT, left, swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up, swapwindow, u
bind = SUPER SHIFT, down, swapwindow, d
binde = SUPER CTRL, right, resizeactive, 30 0
binde = SUPER CTRL, left, resizeactive, -30 0
binde = SUPER CTRL, up, resizeactive, 0 -30
binde = SUPER CTRL, down, resizeactive, 0 30

# Movement with VIM keys
#bind = SUPER SHIFT, h, swapwindow, l
#bind = SUPER SHIFT, l, swapwindow, r
#bind = SUPER SHIFT, k, swapwindow, u
#bind = SUPER SHIFT, j, swapwindow, d
#binde = SUPER CTRL, l, resizeactive, 30 0
#binde = SUPER CTRL, h, resizeactive, -30 0
#binde = SUPER CTRL, k, resizeactive, 0 -30
#binde = SUPER CTRL, j, resizeactive, 0 30

# Screenshots
bind = $mainMod, C, exec, $fullScreenshot
bind = $mainMod SHIFT, C, exec, $tempCapture

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = ,XF86Calculator, exec, org.gnome.Calculator
